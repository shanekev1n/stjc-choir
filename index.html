<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>STJC – Song Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="app">

  <!-- ── LOGIN SCREEN ─────────────────────────────────────────────────────── -->
  <div id="loginScreen" class="login-wrap">
    <div class="login-logo">✝</div>
    <div class="login-title">Saint Teresa's Junior Choir</div>
    <div class="login-sub">STJC – Song Tracker</div>
    <div class="login-box">
      <div class="login-error" id="loginError"></div>
      <div class="form-section" style="margin-top:0">
        <label class="form-label">Username</label>
        <input type="text" class="form-input" id="loginUsername" placeholder="Enter username" autocomplete="off"/>
      </div>
      <div class="form-section">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="loginPassword" placeholder="Enter password" autocomplete="off"/>
      </div>
      <button class="btn-primary" id="loginBtn" onclick="doLogin()">Sign In</button>
    </div>
  </div>

  <!-- ── MAIN APP ──────────────────────────────────────────────────────────── -->
  <div id="mainApp" style="display:none">

    <header class="app-header">
      <button class="back-btn" id="backBtn" style="display:none">‹ Back</button>
      <h1 id="headerTitle">STJC – Song Tracker</h1>
      <div class="header-user" id="headerUser" onclick="doLogout()">
        <span id="headerRole"></span>
        <span id="headerUsername"></span>
      </div>
    </header>

    <!-- Mass List -->
    <div class="screen active" id="screenList">
      <div id="massListContainer"></div>
      <div class="app-footer">
        <div class="footer-name">✝ Saint Teresa's Junior Choir</div>
        <div class="footer-sub">STJC · Song Tracker</div>
      </div>
    </div>

    <!-- New Mass -->
    <div class="screen" id="screenNew">
      <div class="form-section">
        <label class="form-label">Mass Date</label>
        <input type="date" class="form-input" id="newDate"/>
        <div class="form-hint" id="newDateHint">Name will be set automatically</div>
      </div>
      <div class="form-section">
        <label class="form-label">Occasion</label>
        <div class="chip-row" id="occasionChips"></div>
      </div>
      <div class="form-section">
        <label class="form-label">Notes</label>
        <textarea class="form-input" id="newNotes" placeholder="Any notes about this Mass..."></textarea>
      </div>
      <button class="btn-primary" id="createMassBtn" onclick="createMass()">Create Sunday Mass</button>
    </div>

    <!-- Mass Detail -->
    <div class="screen" id="screenDetail">
      <div class="info-card" id="detailInfoCard"></div>
      <div class="table-title">Mass Songs</div>
      <div class="table-scroll">
        <table class="songs-table">
          <thead>
            <tr>
              <th>Part</th><th>Song</th><th>Beat Folder</th>
              <th>Page</th><th>Slot</th><th>Tempo</th><th>Scale</th><th>Key</th>
            </tr>
          </thead>
          <tbody id="songsTableBody"></tbody>
        </table>
      </div>
      <div style="display:flex; gap:10px; margin-top:20px;" id="massActionBtns">
        <button class="btn-danger" id="deleteMassBtn" onclick="deleteMassAction()" style="flex:1;">Delete</button>
        <button class="btn-primary" style="margin-top:0; flex:2;" onclick="saveAllSongs()">Save All</button>
      </div>
    </div>

  </div><!-- /mainApp -->
</div><!-- /app -->

<!-- ── SONG EDIT MODAL ──────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="songModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-part-title" id="modalPartTitle"></div>
    <div class="form-section">
      <label class="form-label">Song Name</label>
      <input type="text" class="form-input" id="mSong" placeholder="Enter song name..." autocomplete="off"/>
    </div>
    <div class="form-section">
      <label class="form-label">Beat Folder</label>
      <div class="chip-row" id="mBeatChips"></div>
    </div>
    <div class="form-section">
      <label class="form-label">Beat Page</label>
      <div class="chip-row" id="mPageChips"></div>
    </div>
    <div class="form-section">
      <label class="form-label">Beat Slot</label>
      <div class="chip-row" id="mSlotChips"></div>
    </div>
    <div class="form-section">
      <label class="form-label">Tempo (BPM)</label>
      <input type="number" class="form-input" id="mTempo" placeholder="e.g. 120" autocomplete="off"/>
    </div>
    <div style="display:flex; gap:12px; align-items:flex-end; margin-top:24px;">
      <div style="flex:1;">
        <label class="form-label">Scale</label>
        <input type="text" class="form-input" id="mScale" placeholder="e.g. C, C+1, D-2" oninput="updateTransposed()" autocomplete="off"/>
      </div>
      <div class="transposed-badge" id="transposedBadge" style="display:none;">
        <span class="transposed-label">KEY</span>
        <span class="transposed-value" id="transposedValue"></span>
      </div>
    </div>
    <button class="btn-clear" id="clearSongBtn" onclick="clearSongFields()">✕ Clear All Fields</button>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save"   onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<!-- ── EDIT MASS INFO MODAL ─────────────────────────────────────────────────── -->
<div class="modal-overlay" id="massInfoModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-part-title">Edit Mass Info</div>
    <div class="form-section">
      <label class="form-label">Date</label>
      <input type="date" class="form-input" id="editDate"/>
    </div>
    <div class="form-section">
      <label class="form-label">Occasion</label>
      <div class="chip-row" id="editOccasionChips"></div>
    </div>
    <div class="form-section">
      <label class="form-label">Notes</label>
      <textarea class="form-input" id="editNotes" placeholder="Add notes..." style="min-height:80px"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeMassInfoModal()">Cancel</button>
      <button class="btn-save"   onclick="saveMassInfo()">Save</button>
    </div>
  </div>
</div>

<!-- ── CONFIRM DIALOG ───────────────────────────────────────────────────────── -->
<div id="confirmOverlay" style="display:none; position:fixed; inset:0; background:#000000bb; z-index:500; align-items:center; justify-content:center; padding:20px;">
  <div style="background:#1c1c36; border:1px solid #ff6b6b55; border-radius:18px; padding:28px 24px; max-width:320px; width:100%; text-align:center;">
    <div style="font-size:28px; margin-bottom:14px;">🗑</div>
    <div id="confirmMsg" style="color:#e8e2d4; font-size:15px; line-height:1.6; margin-bottom:24px;"></div>
    <div style="display:flex; gap:10px;">
      <button id="confirmNo"  style="flex:1; padding:13px; border-radius:10px; border:1px solid #2a2a4a; background:transparent; color:#7a7a9a; font-family:'Cinzel',serif; font-size:13px; cursor:pointer;">Cancel</button>
      <button id="confirmYes" style="flex:1; padding:13px; border-radius:10px; border:none; background:#ff6b6b; color:#fff; font-family:'Cinzel',serif; font-size:13px; font-weight:700; cursor:pointer;">Delete</button>
    </div>
  </div>
</div>

<!-- ── SCRIPTS (order matters) ──────────────────────────────────────────────── -->
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/songs.js"></script>
<script src="js/masses.js"></script>
<script>
  // Wire up event listeners that need DOM ready
  document.getElementById('backBtn').onclick = () => {
    currentMassId = null;
    renderMassList();
    showScreen('screenList', 'STJC – Song Tracker', false);
  };
  document.getElementById('newDate').addEventListener('input', function () {
    document.getElementById('newDateHint').textContent = 'Name will be: ' + (formatName(this.value) || '—');
  });
  document.getElementById('loginPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('songModal').addEventListener('click', function (e) {
    if (e.target === this) closeModal();
  });
  document.getElementById('massInfoModal').addEventListener('click', function (e) {
    if (e.target === this) closeMassInfoModal();
  });

  // Auto-login from session
  const saved = sessionStorage.getItem('stjc_user');
  if (saved) { currentUser = JSON.parse(saved); showMainApp(); }
</script>

</body>
</html>
